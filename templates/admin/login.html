{% extends "admin/login.html" %}

{% block extrahead %}
{{ block.super }}
<style>
    .password-wrapper {
        position: relative;
        display: block;
        width: 100%;
    }

    .password-toggle-btn {
        position: absolute;
        right: 0.5rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        padding: 0.25rem;
        cursor: pointer;
        color: #9CA3AF;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
    }

    .password-toggle-btn svg {
        width: 16px;
        height: 16px;
    }

    .hidden {
        display: none !important;
    }

    /* Specific adjustment for admin login field width */
    .form-row input[type="password"] {
        padding-right: 2.5rem !important;
    }
</style>
{% endblock %}

{% block footer %}
{{ block.super }}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const passwordInputs = document.querySelectorAll('input[type="password"]');

        passwordInputs.forEach(input => {
            // Create wrapper
            const wrapper = document.createElement('div');
            wrapper.className = 'password-wrapper';

            // Insert wrapper before input and move input inside
            input.parentNode.insertBefore(wrapper, input);
            wrapper.appendChild(input);

            // Create toggle button
            const toggleBtn = document.createElement('button');
            toggleBtn.type = 'button';
            toggleBtn.className = 'password-toggle-btn';
            toggleBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="eye-show" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" class="eye-hide hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.046m4.51-4.51A9.959 9.959 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21m-2.101-2.101L3 3m1.414 1.414l12.688 12.688M12 12l.01.01" />
                </svg>
            `;

            wrapper.appendChild(toggleBtn);

            const eyeShow = toggleBtn.querySelector('.eye-show');
            const eyeHide = toggleBtn.querySelector('.eye-hide');

            toggleBtn.addEventListener('click', function () {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);

                // Toggle icons
                eyeShow.classList.toggle('hidden');
                eyeHide.classList.toggle('hidden');
            });
        });
    });
</script>
{% endblock %}
