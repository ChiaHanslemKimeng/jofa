<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f3ebe5; }
        .container { max-width: 600px; margin: 40px auto; background: #ffffff; padding: 0; border: 1px solid #e0e0e0; }
        .header { background-color: #0f2d32; padding: 40px; text-align: center; }
        .header img { max-width: 150px; height: auto; }
        .content { padding: 40px; }
        .footer { background-color: #0f2d32; color: #a58b7c; padding: 30px; text-align: center; font-size: 12px; }
        .footer a { color: #a58b7c; text-decoration: none; font-weight: bold; }
        .btn { display: inline-block; padding: 12px 30px; background-color: #a58b7c; color: #ffffff !important; text-decoration: none; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; margin-top: 20px; }
        .gold { color: #a58b7c; }
        .divider { border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <!-- Replace with actual absolute URL for production -->
            <h1 style="color: #F3EBE5; margin: 0; letter-spacing: 5px; text-transform: uppercase; font-weight: 900;">JOFA</h1>
            <p style="color: #a58b7c; margin: 5px 0 0; font-size: 10px; text-transform: uppercase; letter-spacing: 3px;">Essence of Nature</p>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            <p>&copy; 2026 JOFA Essence. All rights reserved.</p>
            <p>Yaounde, Cameroon | <a href="https://jofaskincare.com">Visit Store</a></p>
            <div style="margin-top: 20px;">
                <p style="font-size: 10px; opacity: 0.7;">You are receiving this email because of your recent activity on our platform.</p>
            </div>
        </div>
    </div>
</body>
</html>
